<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} · G-Trade</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='console.css') }}">
    {% block head %}{% endblock %}
  </head>
  <body class="app-shell">
    <header class="topbar">
      <h1>{{ title }}</h1>
      <div class="topbar-meta">
        <span class="badge badge-neutral" id="topbar-status">{{ state.status }}</span>
        <span class="badge" id="topbar-zone">{{ state.zone.name or 'inactive' }}</span>
      </div>
    </header>

    <nav class="nav">
      {% for page in pages %}
        <a class="nav-link{% if page.active %} is-active{% endif %}" href="{{ page.href }}">{{ page.label }}</a>
      {% endfor %}
    </nav>

    <main class="page">
      {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='console.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
